const typeClass = { "モンスター": "type-monster", "魚": "type-fish", "岩": "type-rock", "木": "type-tree" };
const rankClass = { "金冠": "rank-gold", "銀冠": "rank-silver", "伝説": "rank-legend" };

let currentFilter = "all";
let currentSearch = "";
let sortCol = -1;
let sortAsc = true;

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function highlightText(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return escaped.replace(regex, '<mark>$1</mark>');
}

function render() {
  const tbody = document.getElementById('tbody');
  const q = currentSearch.toLowerCase();

  let filtered = DATA.filter(row => {
    if (currentFilter !== "all" && row[0] !== currentFilter) return false;
    if (q) {
      const searchable = (row[2] + row[3] + row[4] + row[5]).toLowerCase();
      return searchable.includes(q);
    }
    return true;
  });

  if (sortCol >= 0) {
    filtered.sort((a, b) => {
      const va = a[sortCol], vb = b[sortCol];
      const cmp = va.localeCompare(vb, 'ja');
      return sortAsc ? cmp : -cmp;
    });
  }

  document.getElementById('stats').textContent = `${filtered.length} 件表示 / 全 ${DATA.length} 件`;

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('noResults').style.display = '';
    return;
  }
  document.getElementById('noResults').style.display = 'none';

  tbody.innerHTML = filtered.map(row => {
    const [type, rank, name, area, drops, note] = row;
    return `<tr>
      <td><span class="type-badge ${typeClass[type]}">${type}</span></td>
      <td><span class="rank-badge ${rankClass[rank]}">${rank}</span></td>
      <td>${highlightText(name, currentSearch)}</td>
      <td class="area-name">${highlightText(area, currentSearch)}</td>
      <td class="drop-list">${highlightText(drops, currentSearch)}</td>
      <td>${note ? highlightText(note, currentSearch) : ''}</td>
    </tr>`;
  }).join('');
}

document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value.trim();
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = parseInt(th.dataset.col);
    if (col === 4) return; // don't sort drops
    if (sortCol === col) { sortAsc = !sortAsc; }
    else { sortCol = col; sortAsc = true; }
    document.querySelectorAll('.sort-arrow').forEach(s => s.textContent = '');
    th.querySelector('.sort-arrow').textContent = sortAsc ? ' ▲' : ' ▼';
    render();
  });
});

render();

// Hamburger Menu
const hamburgerBtn = document.getElementById('hamburgerBtn');
const navOverlay = document.getElementById('navOverlay');
const navPanel = document.getElementById('navPanel');

function toggleMenu() {
  const isOpen = navPanel.classList.contains('active');
  hamburgerBtn.classList.toggle('active');
  navOverlay.classList.toggle('active');
  navPanel.classList.toggle('active');
  hamburgerBtn.setAttribute('aria-expanded', !isOpen);
  hamburgerBtn.setAttribute('aria-label', isOpen ? 'メニューを開く' : 'メニューを閉じる');
  document.body.style.overflow = isOpen ? '' : 'hidden';
}

hamburgerBtn.addEventListener('click', toggleMenu);
navOverlay.addEventListener('click', toggleMenu);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && navPanel.classList.contains('active')) toggleMenu();
});
